<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT-FIGHT</title>
    <style>
        :root { --p1: #3b82f6; --p2: #ef4444; --gold: #facc15; --bg: #0f172a; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; color: white; }

        #arena { width: 100vw; height: 100vh; position: relative; overflow: hidden; border: 4px solid #1e293b; }
        
        /* Goal Zones */
        .goal { position: absolute; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0.5; }
        #goal-p2 { top: 0; background: linear-gradient(to bottom, var(--p2), transparent); color: white; }
        #goal-p1 { bottom: 0; background: linear-gradient(to top, var(--p1), transparent); color: white; }

        /* The Core */
        #core { 
            position: absolute; width: 50px; height: 50px; background: var(--gold); 
            border-radius: 50%; box-shadow: 0 0 30px var(--gold);
            left: calc(50% - 25px); top: calc(50% - 25px);
            transition: transform 0.05s linear; z-index: 10;
        }

        .score { position: absolute; left: 10px; font-size: 24px; opacity: 0.2; transform: rotate(90deg); }
        #score-p2 { top: 100px; } #score-p1 { bottom: 100px; }

        .vfx { position: absolute; border-radius: 50%; background: white; pointer-events: none; opacity: 0.5; transform: scale(0); animation: pulse 0.3s ease-out; }
        @keyframes pulse { to { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

    <div id="arena">
        <div id="goal-p2" class="goal">PLAYER 2 DEAD ZONE</div>
        <div id="score-p2" class="score">0</div>
        
        <div id="core"></div>
        
        <div id="score-p1" class="score">0</div>
        <div id="goal-p1" class="goal">PLAYER 1 DEAD ZONE</div>
    </div>

    <script>
        const core = document.getElementById('core');
        const arena = document.getElementById('arena');
        let pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let vel = { x: 0, y: 0 };
        let scores = { p1: 0, p2: 0 };
        const friction = 0.98;
        const speedLimit = 15;

        // Multi-touch tracking
        let touches = {};

        window.addEventListener('touchstart', e => {
            Array.from(e.changedTouches).forEach(t => {
                touches[t.identifier] = { x: t.clientX, y: t.clientY };
                createVFX(t.clientX, t.clientY);
                applyBlast(t.clientX, t.clientY);
            });
        });

        window.addEventListener('touchmove', e => {
            Array.from(e.changedTouches).forEach(t => {
                touches[t.identifier] = { x: t.clientX, y: t.clientY };
                applySuction(t.clientX, t.clientY);
            });
        });

        window.addEventListener('touchend', e => {
            Array.from(e.changedTouches).forEach(t => delete touches[t.identifier]);
        });

        function applyBlast(tx, ty) {
            const dx = pos.x - tx;
            const dy = pos.y - ty;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 150) {
                vel.x += (dx / dist) * 10;
                vel.y += (dy / dist) * 10;
            }
        }

        function applySuction(tx, ty) {
            const dx = tx - pos.x;
            const dy = ty - pos.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 200) {
                vel.x += (dx / dist) * 0.5;
                vel.y += (dy / dist) * 0.5;
            }
        }

        function createVFX(x, y) {
            const v = document.createElement('div');
            v.className = 'vfx';
            v.style.left = x + 'px';
            v.style.top = y + 'px';
            v.style.width = '20px'; v.style.height = '20px';
            arena.appendChild(v);
            setTimeout(() => v.remove(), 300);
        }

        function update() {
            // Physics
            pos.x += vel.x;
            pos.y += vel.y;
            vel.x *= friction;
            vel.y *= friction;

            // Bounce off walls
            if(pos.x < 25 || pos.x > window.innerWidth - 25) {
                vel.x *= -1;
                pos.x = pos.x < 25 ? 25 : window.innerWidth - 25;
            }

            // Scoring
            if(pos.y < 0) { // P1 Scores
                scores.p1++;
                resetCore();
            } else if(pos.y > window.innerHeight) { // P2 Scores
                scores.p2++;
                resetCore();
            }

            // Update UI
            core.style.transform = `translate(${pos.x - (window.innerWidth/2)}px, ${pos.y - (window.innerHeight/2)}px)`;
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;

            requestAnimationFrame(update);
        }

        function resetCore() {
            pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            vel = { x: 0, y: 0 };
            core.style.background = 'white';
            setTimeout(() => core.style.background = 'var(--gold)', 500);
        }

        update();
    </script>
</body>
</html>
