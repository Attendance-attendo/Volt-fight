<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT-STRIKER: TACTICAL</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --p1: #00f2ff; --p2: #ff0040; --gold: #facc15; --bg: #050505; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; color: white; }

        #menu { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #menu img { width: 85%; max-width: 380px; border-radius: 10px; margin-bottom: 25px; border: 2px solid var(--gold); }
        .btn { padding: 18px 45px; background: var(--gold); color: #000; border: none; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }

        #arena { display: none; width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle at center, #111, #000); }
        
        /* The Core */
        #core { position: absolute; width: 46px; height: 46px; background: #fff; border-radius: 8px; transform: rotate(45deg); box-shadow: 0 0 30px #fff; border: 4px solid var(--gold); z-index: 10; will-change: transform; }

        /* Power-Up Crates */
        .crate { position: absolute; width: 40px; height: 40px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); transition: 0.3s; }
        .c-speed { border-color: var(--gold); color: var(--gold); }
        .c-shield { border-color: #00ff00; color: #00ff00; }

        .bullet { position: absolute; border-radius: 2px; z-index: 5; pointer-events: none; }
        .b-p1 { background: var(--p1); box-shadow: 0 0 10px var(--p1); }
        .b-p2 { background: var(--p2); box-shadow: 0 0 10px var(--p2); }

        .score { position: absolute; left: 20px; font-size: 60px; opacity: 0.1; font-weight: 900; font-style: italic; }
        #score-p2 { top: 120px; transform: rotate(180deg); color: var(--p2); }
        #score-p1 { bottom: 120px; color: var(--p1); }
        
        .cannon { width: 14px; height: 35px; background: #333; border: 2px solid #fff; position: absolute; bottom: 10px; left: calc(50% - 7px); transform-origin: center bottom; }
        #t2 { top: 10px; transform: rotate(180deg); border-color: var(--p2); }
        #t1 { bottom: 10px; border-color: var(--p1); }
    </style>
</head>
<body>

    <div id="menu">
        <img src="Logo.png" alt="Volt Striker Logo">
        <button class="btn" onclick="start('1P')">PC: SOLO VS AI</button>
        <button class="btn" style="background: white; margin-top: 15px;" onclick="start('2P')">MOBILE: 2 PLAYER</button>
    </div>

    <div id="arena">
        <div id="score-p2" class="score">0</div>
        <div id="t2" class="cannon"></div>
        <div id="core"></div>
        <div id="t1" class="cannon"></div>
        <div id="score-p1" class="score">0</div>
    </div>

    <script>
        const core = document.getElementById('core'), arena = document.getElementById('arena');
        const t1 = document.getElementById('t1'), t2 = document.getElementById('t2');
        let pos = { x: window.innerWidth/2, y: window.innerHeight/2, rot: 45 }, vel = { x: 0, y: 0 };
        let scores = { p1: 0, p2: 0 }, bullets = [], crates = [], mode = '2P', running = false;
        let lastHitter = null; // Tracks who touched the ball last

        function start(m) {
            mode = m;
            document.getElementById('menu').style.display = 'none';
            arena.style.display = 'block';
            running = true;
            setInterval(spawnCrate, 12000);
            requestAnimationFrame(update);
        }

        // --- Interaction ---
        window.addEventListener('touchstart', e => {
            if(!running) return;
            Array.from(e.changedTouches).forEach(t => fire(t.clientX, t.clientY, t.clientY > window.innerHeight/2));
        });
        window.addEventListener('mousedown', e => { if(running) fire(e.clientX, e.clientY, true); });

        function fire(tx, ty, isP1) {
            if(mode === '1P' && !isP1) return;
            const sX = window.innerWidth/2, sY = isP1 ? window.innerHeight - 20 : 20;
            const angle = Math.atan2(ty - sY, tx - sX);
            const b = { x: sX, y: sY, vx: Math.cos(angle)*18, vy: Math.sin(angle)*18, owner: isP1?'p1':'p2', el: document.createElement('div') };
            b.el.className = `bullet b-${b.owner}`;
            b.el.style.width='6px'; b.el.style.height='14px';
            arena.appendChild(b.el);
            bullets.push(b);
            (isP1?t1:t2).style.transform = `rotate(${angle * 180/Math.PI + (isP1?90:-90)}deg)`;
        }

        function spawnCrate() {
            if(!running || crates.length > 1) return;
            const type = Math.random() > 0.5 ? '⚡' : '🛡️';
            const c = { x: Math.random()*(window.innerWidth-100)+50, y: window.innerHeight/2 + (Math.random()*100-50), type, el: document.createElement('div') };
            c.el.className = `crate ${type==='⚡'?'c-speed':'c-shield'}`;
            c.el.innerHTML = type;
            c.el.style.left = c.x+'px'; c.el.style.top = c.y+'px';
            arena.appendChild(c.el);
            crates.push(c);
        }

        let aiCooldown = 0;
        function update() {
            if(!running) return;

            // --- AI ANALYZER ---
            if(mode === '1P' && aiCooldown-- < 0) {
                // Determine Target: Goal or PowerUp?
                let targetX = pos.x + (vel.x * 8);
                let targetY = pos.y + (vel.y * 8);
                
                // If AI is losing, prioritize hitting the crate!
                if(scores.p2 < scores.p1 && crates.length > 0) {
                    targetX = crates[0].x; targetY = crates[0].y;
                }
                
                if(pos.y < window.innerHeight * 0.7) {
                    fire(targetX, targetY, false);
                    aiCooldown = 22;
                }
            }

            pos.x += vel.x; pos.y += vel.y;
            vel.x *= 0.985; vel.y *= 0.985;
            pos.rot += 2;

            // Bullet Logic
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
                const d = Math.sqrt((b.x - pos.x)**2 + (b.y - pos.y)**2);
                if(d < 40) {
                    vel.x = b.vx * 0.8; vel.y = b.vy * 0.8;
                    lastHitter = b.owner;
                    b.el.remove(); bullets.splice(i, 1);
                }
                if(b.y < -20 || b.y > window.innerHeight + 20) { b.el.remove(); bullets.splice(i, 1); }
            });

            // Crate Logic (ONLY CORE CAN HIT)
            crates.forEach((c, i) => {
                const d = Math.sqrt((pos.x - (c.x+20))**2 + (pos.y - (c.y+20))**2);
                if(d < 45) {
                    activatePower(c.type, lastHitter);
                    c.el.remove(); crates.splice(i, 1);
                }
            });

            if(pos.x < 25 || pos.x > window.innerWidth - 25) { vel.x *= -1; }
            if(pos.y < -60) { scores.p1++; reset(); }
            if(pos.y > window.innerHeight + 60) { scores.p2++; reset(); }

            core.style.transform = `translate(${pos.x - 23}px, ${pos.y - 23}px) rotate(${pos.rot}deg)`;
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;
            requestAnimationFrame(update);
        }

        function activatePower(type, owner) {
            if(!owner) return;
            if(type === '⚡') { vel.x *= 2; vel.y *= 2; }
            if(type === '🛡️') { /* Add visual shield logic here */ }
        }

        function reset() { pos.x = window.innerWidth/2; pos.y = window.innerHeight/2; vel = {x:0, y:0}; lastHitter = null; }
    </script>
</body>
</html>
