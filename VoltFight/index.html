<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT-STRIKER OMEGA</title>
    <style>
        :root { --p1: #00f2ff; --p2: #ff0040; --gold: #facc15; --bg: #050505; }
        * { box-sizing: border-box; touch-action: none; user-select: none; outline: none; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; }

        #arena { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle, #111 0%, #000 100%); overflow: hidden; }
        
        /* The Core - Now with a Pulsing Glow */
        #core { 
            position: absolute; width: 45px; height: 45px; background: #fff; 
            border-radius: 8px; transform: rotate(45deg); 
            box-shadow: 0 0 40px var(--gold); border: 4px solid var(--gold); 
            z-index: 10; transition: background 0.1s;
        }

        /* Neon Power Ups */
        .crate { 
            position: absolute; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            background: rgba(255,255,255,0.1); border: 3px solid #fff;
            box-shadow: 0 0 20px #fff; animation: glow 1.5s infinite alternate;
        }
        @keyframes glow { from { opacity: 0.6; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }

        .bullet { position: absolute; width: 8px; height: 18px; border-radius: 4px; z-index: 5; }
        .b-p1 { background: var(--p1); box-shadow: 0 0 15px var(--p1); }
        .b-p2 { background: var(--p2); box-shadow: 0 0 15px var(--p2); }

        .score { position: absolute; left: 20px; font-size: 50px; opacity: 0.15; font-weight: 900; color: white; }
        #s-p2 { top: 100px; transform: rotate(180deg); }
        #s-p1 { bottom: 100px; }
        
        .cannon { width: 16px; height: 40px; background: #333; border: 2px solid #fff; position: absolute; transform-origin: center bottom; }
        #t2 { top: 10px; left: calc(50% - 8px); transform: rotate(180deg); border-color: var(--p2); }
        #t1 { bottom: 10px; left: calc(50% - 8px); border-color: var(--p1); }
    </style>
</head>
<body>

    <div id="arena">
        <div id="s-p2" class="score">0</div>
        <div id="t2" class="cannon"></div>
        <div id="core"></div>
        <div id="t1" class="cannon"></div>
        <div id="s-p1" class="score">0</div>
    </div>

    <script>
        const core = document.getElementById('core'), arena = document.getElementById('arena');
        const t1 = document.getElementById('t1'), t2 = document.getElementById('t2');
        let pos = { x: window.innerWidth/2, y: window.innerHeight/2, rot: 45 }, vel = { x: 0, y: 0 };
        let scores = { p1: 0, p2: 0 }, bullets = [], crates = [], lastHitter = 'p1';

        // --- Bullet Firing ---
        window.addEventListener('pointerdown', e => fire(e.clientX, e.clientY, e.clientY > window.innerHeight/2));

        function fire(tx, ty, isP1) {
            const sX = window.innerWidth/2, sY = isP1 ? window.innerHeight - 30 : 30;
            const angle = Math.atan2(ty - sY, tx - sX);
            const b = { x: sX, y: sY, vx: Math.cos(angle)*20, vy: Math.sin(angle)*20, owner: isP1?'p1':'p2', el: document.createElement('div') };
            b.el.className = `bullet b-${b.owner}`;
            arena.appendChild(b.el);
            bullets.push(b);
            (isP1?t1:t2).style.transform = `rotate(${angle * 180/Math.PI + (isP1?90:-90)}deg)`;
        }

        // --- AI ANALYZER (Aggressive Mode) ---
        let aiCooldown = 0;
        function runAI() {
            if(aiCooldown-- > 0) return;
            // AI aims for the ball OR the crate
            let target = (crates.length > 0 && pos.y > window.innerHeight/2) ? {x: crates[0].x, y: crates[0].y} : {x: pos.x + vel.x*5, y: pos.y + vel.y*5};
            
            if(pos.y < window.innerHeight * 0.6) {
                fire(target.x, target.y, false);
                aiCooldown = 12; // High speed firing
            }
        }

        function spawnCrate() {
            if(crates.length > 0) return;
            const c = { x: Math.random()*(window.innerWidth-60), y: window.innerHeight/2, el: document.createElement('div') };
            c.el.className = 'crate'; c.el.innerHTML = '⚡';
            c.el.style.left = c.x+'px'; c.el.style.top = c.y+'px';
            arena.appendChild(c.el);
            crates.push(c);
        }
        setInterval(spawnCrate, 8000);

        function update() {
            runAI();
            pos.x += vel.x; pos.y += vel.y;
            vel.x *= 0.99; vel.y *= 0.99;
            pos.rot += 2;

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
                
                const d = Math.sqrt((b.x - pos.x)**2 + (b.y - pos.y)**2);
                if(d < 35) {
                    // --- THE FIX: FORCE REVERSAL ---
                    vel.x = b.vx * 1.2; 
                    vel.y = b.vy * 1.2;
                    lastHitter = b.owner;
                    b.el.remove(); bullets.splice(i, 1);
                    core.style.background = "#fffa00";
                    setTimeout(() => core.style.background = "#fff", 50);
                }
                if(b.y < -20 || b.y > window.innerHeight + 20) { b.el.remove(); bullets.splice(i, 1); }
            });

            crates.forEach((c, i) => {
                if(Math.sqrt((pos.x - c.x)**2 + (pos.y - c.y)**2) < 40) {
                    vel.x *= 2; vel.y *= 2; // Speed boost
                    c.el.remove(); crates.splice(i, 1);
                }
            });

            if(pos.x < 20 || pos.x > window.innerWidth-20) vel.x *= -1;
            if(pos.y < -50) { scores.p1++; reset(); }
            if(pos.y > window.innerHeight+50) { scores.p2++; reset(); }

            core.style.transform = `translate(${pos.x-22}px, ${pos.y-22}px) rotate(${pos.rot}deg)`;
            document.getElementById('s-p1').innerText = scores.p1;
            document.getElementById('s-p2').innerText = scores.p2;
            requestAnimationFrame(update);
        }

        function reset() { pos.x = window.innerWidth/2; pos.y = window.innerHeight/2; vel = {x:0, y:0}; }
        update();
    </script>
</body>
</html>
