<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT-FIGHT</title>
    <style>
        :root { --p1: #3b82f6; --p2: #ef4444; --gold: #facc15; --bg: #000; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            color: white; 
        }

        /* Start Menu with your Logo */
        #menu { 
            position: fixed; inset: 0; z-index: 100; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        #menu img { 
            width: 85%; 
            max-width: 450px; 
            border-radius: 15px; 
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.4);
            margin-bottom: 30px;
        }
        
        .btn { 
            padding: 18px 50px; background: var(--gold); 
            color: black; border: none; border-radius: 50px; font-weight: 900; 
            font-size: 22px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.9; }

        /* Battle Arena */
        #arena { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        .goal { position: absolute; width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; letter-spacing: 5px; opacity: 0.4; }
        #goal-p2 { top: 0; background: linear-gradient(to bottom, var(--p2), transparent); color: #fff; }
        #goal-p1 { bottom: 0; background: linear-gradient(to top, var(--p1), transparent); color: #fff; }

        /* The Volt Bulb (Core) */
        #core { 
            position: absolute; width: 60px; height: 60px; background: #fff; 
            border-radius: 50%; box-shadow: 0 0 50px var(--gold);
            left: calc(50% - 30px); top: calc(50% - 30px); z-index: 10;
            border: 4px solid var(--gold);
            will-change: transform;
        }

        .score { position: absolute; left: 20px; font-size: 50px; opacity: 0.2; font-style: italic; font-weight: 900; }
        #score-p2 { top: 140px; transform: rotate(180deg); color: var(--p2); }
        #score-p1 { bottom: 140px; color: var(--p1); }

        /* Tap VFX */
        .spark { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; pointer-events: none; animation: explode 0.4s ease-out forwards; }
        @keyframes explode { to { transform: scale(8); opacity: 0; } }
    </style>
</head>
<body>

    <div id="menu">
        <img src="Logo.png" alt="Volt Fight Logo">
        <button class="btn" onclick="startGame()">Start Battle</button>
    </div>

    <div id="arena">
        <div id="goal-p2" class="goal">PLAYER 2 DEAD ZONE</div>
        <div id="score-p2" class="score">0</div>
        
        <div id="core"></div>
        
        <div id="score-p1" class="score">0</div>
        <div id="goal-p1" class="goal">PLAYER 1 DEAD ZONE</div>
    </div>

    <script>
        const core = document.getElementById('core');
        const arena = document.getElementById('arena');
        
        // Physics Setup
        let pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let vel = { x: 0, y: 0 };
        let scores = { p1: 0, p2: 0 };
        const friction = 0.985;
        let isRunning = false;

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            arena.style.display = 'block';
            isRunning = true;
            // Initial kick-off
            vel.y = 5;
            requestAnimationFrame(update);
        }

        // Handle Taps (Blasts)
        window.addEventListener('touchstart', e => {
            if(!isRunning) return;
            Array.from(e.changedTouches).forEach(t => {
                createSpark(t.clientX, t.clientY);
                
                const dx = pos.x - t.clientX;
                const dy = pos.y - t.clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < 300) { // Large hit radius
                    const force = 22;
                    vel.x += (dx / dist) * force;
                    vel.y += (dy / dist) * force;
                }
            });
        });

        function createSpark(x, y) {
            const s = document.createElement('div');
            s.className = 'spark';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            arena.appendChild(s);
            setTimeout(() => s.remove(), 400);
        }

        function update() {
            if(!isRunning) return;

            // Movement
            pos.x += vel.x;
            pos.y += vel.y;

            // Friction
            vel.x *= friction;
            vel.y *= friction;

            // Boundary Bounce (Side Walls)
            if(pos.x < 30 || pos.x > window.innerWidth - 30) {
                vel.x *= -1.05; // Speed up on bounce
                pos.x = pos.x < 30 ? 30 : window.innerWidth - 30;
            }

            // Scoring Logic
            if(pos.y < -50) { // P1 Scores
                scores.p1++;
                resetRound(1);
            } else if(pos.y > window.innerHeight + 50) { // P2 Scores
                scores.p2++;
                resetRound(-1);
            }

            // Limit Max Speed
            const speed = Math.sqrt(vel.x**2 + vel.y**2);
            if(speed > 25) {
                vel.x *= 0.9;
                vel.y *= 0.9;
            }

            // Render
            core.style.left = `${pos.x - 30}px`;
            core.style.top = `${pos.y - 30}px`;
            
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;

            requestAnimationFrame(update);
        }

        function resetRound(dir) {
            pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            vel = { x: (Math.random() - 0.5) * 10, y: dir * 10 };
            core.style.backgroundColor = "white";
            setTimeout(() => core.style.backgroundColor = "white", 200);
        }
    </script>
</body>
</html>
