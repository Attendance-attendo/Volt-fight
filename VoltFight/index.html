<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT-FIGHT</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --p1: #3b82f6; --p2: #ef4444; --gold: #facc15; --bg: #000; }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; color: white; }

        /* Start Menu */
        #menu { 
            position: fixed; inset: 0; z-index: 100; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #menu img { width: 85%; max-width: 400px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(250, 204, 21, 0.3); }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { 
            padding: 18px; background: var(--gold); color: black; border: none; 
            border-radius: 50px; font-weight: 900; font-size: 18px; cursor: pointer; 
            text-transform: uppercase; transition: 0.1s;
        }
        #installBtn { background: #fff; font-size: 14px; display: none; }
        .btn:active { transform: scale(0.95); }

        /* Battle Arena */
        #arena { display: none; width: 100vw; height: 100vh; position: relative; }
        .goal { position: absolute; width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 10px; opacity: 0.3; font-weight: 900; }
        #goal-p2 { top: 0; background: linear-gradient(to bottom, var(--p2), transparent); }
        #goal-p1 { bottom: 0; background: linear-gradient(to top, var(--p1), transparent); }

        #core { 
            position: absolute; width: 60px; height: 60px; background: #fff; 
            border-radius: 50%; box-shadow: 0 0 40px var(--gold);
            left: 0; top: 0; z-index: 10; border: 4px solid var(--gold);
            will-change: transform;
        }

        .score { position: absolute; left: 20px; font-size: 40px; opacity: 0.2; font-weight: 900; }
        #score-p2 { top: 120px; transform: rotate(180deg); color: var(--p2); }
        #score-p1 { bottom: 120px; color: var(--p1); }
    </style>
</head>
<body>

    <div id="menu">
        <img src="Logo.png" alt="Volt Fight Logo">
        <div class="btn-group">
            <button class="btn" onclick="startGame()">Start Battle</button>
            <button id="installBtn" class="btn">📥 Download App</button>
        </div>
    </div>

    <div id="arena">
        <div id="goal-p2" class="goal">P2 DEFENSE ZONE</div>
        <div id="score-p2" class="score">0</div>
        <div id="core"></div>
        <div id="score-p1" class="score">0</div>
        <div id="goal-p1" class="goal">P1 DEFENSE ZONE</div>
    </div>

    <script>
        const core = document.getElementById('core');
        const arena = document.getElementById('arena');
        const installBtn = document.getElementById('installBtn');
        let deferredPrompt;

        let pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let vel = { x: 0, y: 0 };
        let scores = { p1: 0, p2: 0 };
        const friction = 0.985;
        let running = false;

        // Interaction Logic
        const handleAction = (tx, ty) => {
            if(!running) return;

            const dx = pos.x - tx;
            const dy = pos.y - ty;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 280) {
                // GOALIE LOGIC: Boost power when defending your own goal
                let powerMult = 1.0;
                if (pos.y > window.innerHeight * 0.7 && ty > window.innerHeight * 0.7) powerMult = 2.5;
                if (pos.y < window.innerHeight * 0.3 && ty < window.innerHeight * 0.3) powerMult = 2.5;

                // MOMENTUM KILL: Stops the ball from flying into your own goal when you hit it
                vel.x *= 0.3;
                vel.y *= 0.3;

                const force = 22 * powerMult;
                vel.x += (dx / dist) * force;
                vel.y += (dy / dist) * force;

                // Vibrate on mobile
                if (navigator.vibrate) navigator.vibrate(25);
            }
        };

        window.addEventListener('mousedown', e => handleAction(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => {
            Array.from(e.changedTouches).forEach(t => handleAction(t.clientX, t.clientY));
        });

        // App Installation
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
            }
        });

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            arena.style.display = 'block';
            running = true;
            vel.y = 8; // Kickoff
            requestAnimationFrame(update);
        }

        function update() {
            if(!running) return;

            pos.x += vel.x;
            pos.y += vel.y;
            vel.x *= friction;
            vel.y *= friction;

            // Speed Limit to prevent glitching
            const speed = Math.sqrt(vel.x**2 + vel.y**2);
            if(speed > 25) { vel.x *= 0.9; vel.y *= 0.9; }

            // Bounce Sides
            if(pos.x < 30 || pos.x > window.innerWidth - 30) {
                vel.x *= -0.8; 
                pos.x = pos.x < 30 ? 30 : window.innerWidth - 30;
            }

            // Scoring
            if(pos.y < -50) { scores.p1++; reset(1); }
            else if(pos.y > window.innerHeight + 50) { scores.p2++; reset(-1); }

            core.style.transform = `translate(${pos.x - 30}px, ${pos.y - 30}px)`;
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;

            requestAnimationFrame(update);
        }

        function reset(dir) {
            pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            vel = { x: (Math.random()-0.5)*12, y: dir*12 };
            core.style.backgroundColor = "white";
            setTimeout(() => core.style.backgroundColor = "white", 200);
        }
    </script>
</body>
</html>
